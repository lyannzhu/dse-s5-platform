<title>DSE 備考計劃 - 每週計劃表</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --p1: #2563eb; --p1-bg: #eff6ff; --p1-border: #bfdbfe;

    --p3: #dc2626; --p3-bg: #fef2f2; --p3-border: #fecaca;
    --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
    --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
    --math: #1d4ed8; --math-bg: #dbeafe;
    --bio: #15803d; --bio-bg: #dcfce7;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-900); }

  .header { background:white; padding:20px 24px; border-bottom:1px solid var(--gray-200); box-shadow:0 1px 3px rgba(0,0,0,.05); position:sticky; top:0; z-index:100; }
  .header h1 { font-size:1.3rem; }
  .header h1 i { margin-right:8px; color:var(--p1); }
  .header .sub { font-size:.85rem; color:var(--gray-500); margin-top:4px; }

  .container { max-width:1100px; margin:0 auto; padding:20px 16px; }

  /* Legend */
  .legend { display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:.8rem; }
  .legend-dot { width:12px; height:12px; border-radius:3px; }
  .legend-dot.lp1 { background:var(--p1); }
  .legend-dot.lp2 { background:var(--p2); }
  .legend-dot.lp3 { background:var(--p3); }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .stat-card { background:white; border-radius:var(--radius); padding:16px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .stat-card .num { font-size:1.6rem; font-weight:700; }
  .stat-card .lbl { font-size:.78rem; color:var(--gray-500); margin-top:2px; }

  /* Filter */
  .filter { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .filter button { padding:6px 14px; border:1px solid var(--gray-200); background:white; border-radius:20px; font-size:.8rem; cursor:pointer; transition:.2s; font-weight:500; }
  .filter button:hover { background:var(--gray-100); }
  .filter button.active { background:var(--p1); color:white; border-color:var(--p1); }

  /* Table */
  .plan-table { width:100%; border-collapse:collapse; background:white; border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .plan-table th { background:var(--gray-100); padding:10px 12px; font-size:.78rem; font-weight:700; text-align:left; border-bottom:2px solid var(--gray-200); white-space:nowrap; position:sticky; top:52px; z-index:50; }
  .plan-table td { padding:10px 12px; font-size:.82rem; border-bottom:1px solid var(--gray-100); vertical-align:top; }
  .plan-table tr:hover { background:var(--gray-50); }

  .phase-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:700; color:white; }
  .phase-tag.p1 { background:var(--p1); }
  .phase-tag.p2 { background:var(--p2); }
  .phase-tag.p3 { background:var(--p3); }

  .subj-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:.68rem; font-weight:700; margin-right:4px; }
  .subj-tag.math { background:var(--math-bg); color:var(--math); }
  .subj-tag.bio { background:var(--bio-bg); color:var(--bio); }

  .date-text { font-size:.75rem; color:var(--gray-500); white-space:nowrap; }
  .topic-text { font-weight:600; font-size:.83rem; }
  .focus-text { font-size:.75rem; color:var(--gray-500); margin-top:2px; }

  .check-box { width:18px; height:18px; accent-color:#10b981; cursor:pointer; }

  /* Month Exam Section */
  .exam-section { margin-top:32px; }
  .exam-section h2 { font-size:1.1rem; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .exam-section h2 i { color:var(--p2); }
  .exam-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:12px; }
  .exam-card { background:white; border-radius:var(--radius); padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); border-left:4px solid var(--p2); }
  .exam-card h3 { font-size:.9rem; margin-bottom:8px; }
  .exam-card .exam-info { font-size:.8rem; color:var(--gray-500); }
  .exam-card .exam-subject { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.72rem; font-weight:700; margin-right:6px; }
  .exam-card .exam-subject.math { background:var(--math-bg); color:var(--math); }
  .exam-card .exam-subject.bio { background:var(--bio-bg); color:var(--bio); }

  @media(max-width:768px) {
    .stats { grid-template-columns:1fr; }
    .container { padding:12px 8px; }
    .plan-table th, .plan-table td { padding:8px 6px; font-size:.75rem; }
    .plan-table .focus-col { display:none; }
    .header { padding:14px 16px; }
    .exam-grid { grid-template-columns:1fr; }
  }
</style>
</head>

const MONTHS = ['2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
const MONTH_NAMES = {'2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月','2027-01':'1月','2027-02':'2月','2027-03':'3月'};

let currentFilter = 'all';

function fd(d){ const p=d.split('-'); return p[1]+'/'+p[2]; }
function isChecked(w){ return localStorage.getItem('wp_'+w)==='1'; }
function toggleCheck(w){ localStorage.setItem('wp_'+w, isChecked(w)?'0':'1'); render(); }
function esc(s){ return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === RENDER ===
function render(){
  // Stats
  const done = WEEKLY_PLAN.filter(w=>isChecked(w.week)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${WEEKLY_PLAN.length}</div><div class="lbl">總週數</div></div>
    <div class="stat-card"><div class="num" style="color:#10b981">${done}</div><div class="lbl">已完成</div></div>
    <div class="stat-card"><div class="num" style="color:${done/WEEKLY_PLAN.length>0.7?'#10b981':done/WEEKLY_PLAN.length>0.4?'#f59e0b':'var(--p3)'}">${(done/WEEKLY_PLAN.length*100).toFixed(0)}%</div><div class="lbl">完成率</div></div>
  `;

  // Filter
  document.getElementById('filter').innerHTML = `<button class="${currentFilter==='all'?'active':''}" onclick="setFilter('all')">全部</button>` +
    MONTHS.map(m=>`<button class="${currentFilter===m?'active':''}" onclick="setFilter('${m}')">${MONTH_NAMES[m]}</button>`).join('');

  // Table
  const filtered = currentFilter==='all' ? WEEKLY_PLAN : WEEKLY_PLAN.filter(w=>w.month===currentFilter);
  document.getElementById('tbody').innerHTML = filtered.map(w=>`
    <tr style="opacity:${isChecked(w.week)?'0.5':'1'}">
      <td><input type="checkbox" class="check-box" ${isChecked(w.week)?'checked':''} onchange="toggleCheck(${w.week})"></td>
      <td><strong>W${w.week}</strong></td>
      <td><span class="date-text">${fd(w.startDate)}<br>${fd(w.endDate)}</span></td>
      <td><span class="phase-tag p${w.phase}">階段${['','一','二','三'][w.phase]}</span></td>
      <td><span class="subj-tag math">數</span><span class="topic-text">${esc(w.math.topic)}</span></td>
      <td><span class="subj-tag bio">生</span><span class="topic-text">${esc(w.bio.topic)}</span></td>
      <td class="focus-col"><span class="focus-text">${esc(w.math.mcFocus)}</span></td>
      <td class="focus-col"><span class="focus-text">${esc(w.math.sqFocus)}</span></td>
    </tr>
  `).join('');

  // Exams
  document.getElementById('exams').innerHTML = MONTHLY_EXAMS.map(ex=>`
    <div class="exam-card">
      <h3><i class="fas fa-calendar"></i> ${ex.period}</h3>
      ${ex.subjects.map(s=>`
        <div style="margin-top:6px">
          <span class="exam-subject ${s.subject==='math'?'math':'bio'}">${s.subject==='math'?'數學':'生物'}</span>
          <strong style="font-size:.85rem">${esc(s.name)}</strong>
          <div class="exam-info"><i class="fas fa-book"></i> ${Array.isArray(s.chapters)?s.chapters.join(', '):s.chapters} · <i class="fas fa-clock"></i> ${s.time}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function setFilter(f){ currentFilter=f; render(); }
render();
