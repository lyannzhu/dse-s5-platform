<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSE 備考計劃 2026-2027</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #7c3aed;
    --accent: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-500: #64748b;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --radius: 12px;
    --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height:100vh; }

  /* Login Page */
  #login-page { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .login-box { background:white; border-radius:16px; padding:48px; width:420px; max-width:90vw; box-shadow: var(--shadow-lg); text-align:center; }
  .login-box h1 { font-size:1.8rem; margin-bottom:8px; color:var(--gray-900); }
  .login-box p.sub { color:var(--gray-500); margin-bottom:32px; font-size:.95rem; }
  .login-box .role-tabs { display:flex; gap:8px; margin-bottom:24px; }
  .login-box .role-tab { flex:1; padding:12px; border:2px solid var(--gray-200); border-radius:var(--radius); cursor:pointer; transition:.2s; font-weight:600; }
  .login-box .role-tab.active { border-color:var(--primary); background:var(--primary); color:white; }
  .login-box .role-tab i { display:block; font-size:1.5rem; margin-bottom:4px; }
  .login-box input[type=text], .login-box input[type=password] { width:100%; padding:12px 16px; border:2px solid var(--gray-200); border-radius:8px; font-size:1rem; margin-bottom:12px; transition:.2s; }
  .login-box input:focus { outline:none; border-color:var(--primary); }
  .login-box .student-fields { display:none; }
  .login-box .student-fields.show { display:block; }
  .login-box .student-row { display:flex; gap:12px; }
  .login-box .student-row input { flex:1; }
  .login-box button { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:600; cursor:pointer; transition:.2s; }
  .login-box button:hover { background:var(--primary-dark); }
  .login-box .error { color:var(--danger); font-size:.85rem; margin-top:12px; display:none; }

  /* Header */
  .header { background:white; padding:16px 24px; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .header h1 { font-size:1.3rem; display:flex; align-items:center; gap:10px; }
  .header h1 .math-icon { color:var(--primary); }
  .header h1 .bio-icon { color:var(--success); }
  .header .user-info { display:flex; align-items:center; gap:12px; }
  .header .user-badge { background:var(--gray-100); padding:6px 14px; border-radius:20px; font-size:.85rem; font-weight:600; }
  .header .user-badge i { margin-right:4px; }
  .header .logout-btn { background:none; border:1px solid var(--gray-300); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:.85rem; transition:.2s; }
  .header .logout-btn:hover { background:var(--gray-100); }

  /* Navigation */
  .nav { background:white; border-bottom:1px solid var(--gray-200); padding:0 24px; display:flex; gap:0; overflow-x:auto; }
  .nav button { padding:14px 20px; border:none; background:none; font-size:.9rem; font-weight:600; color:var(--gray-500); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:.2s; }
  .nav button:hover { color:var(--primary); }
  .nav button.active { color:var(--primary); border-bottom-color:var(--primary); }
  .nav button i { margin-right:6px; }

  /* Content */
  .content { max-width:1200px; margin:0 auto; padding:24px; }
  .page { display:none; }
  .page.active { display:block; }

  /* Cards */
  .card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
  .card h2 { font-size:1.2rem; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .card h2 i { color:var(--primary); }

  /* Phase Banner */
  .phase-banner { padding:20px 24px; border-radius:var(--radius); margin-bottom:24px; color:white; }
  .phase-banner.phase1 { background: linear-gradient(135deg, #2563eb, #3b82f6); }
  .phase-banner.phase2 { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
  .phase-banner.phase3 { background: linear-gradient(135deg, #dc2626, #ef4444); }
  .phase-banner h2 { color:white; font-size:1.3rem; margin-bottom:4px; }
  .phase-banner p { opacity:.9; font-size:.9rem; }

  /* Overview Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card { background:white; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); text-align:center; }
  .stat-card .number { font-size:2rem; font-weight:700; color:var(--primary); }
  .stat-card .label { font-size:.85rem; color:var(--gray-500); margin-top:4px; }

  /* Week Card */
  .week-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:16px; }
  .week-card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border-left:4px solid var(--gray-300); transition:.2s; }
  .week-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
  .week-card.p1 { border-left-color:var(--primary); }
  .week-card.p2 { border-left-color:var(--secondary); }
  .week-card.p3 { border-left-color:var(--danger); }
  .week-card.completed { opacity:.7; border-left-color:var(--success); }
  .week-header { padding:14px 18px; background:var(--gray-50); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gray-200); }
  .week-header .week-num { font-weight:700; font-size:.95rem; }
  .week-header .week-date { font-size:.8rem; color:var(--gray-500); }
  .week-body { padding:14px 18px; }
  .week-subject { margin-bottom:10px; }
  .week-subject:last-child { margin-bottom:0; }
  .subject-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.75rem; font-weight:700; margin-bottom:4px; }
  .subject-tag.math { background:#dbeafe; color:#1d4ed8; }
  .subject-tag.bio { background:#dcfce7; color:#15803d; }
  .subject-topic { font-size:.9rem; font-weight:600; }
  .subject-detail { font-size:.8rem; color:var(--gray-500); margin-top:2px; }

  /* Progress Bar */
  .progress-bar { height:8px; background:var(--gray-200); border-radius:4px; overflow:hidden; margin:8px 0; }
  .progress-bar .fill { height:100%; background:var(--success); border-radius:4px; transition:width .5s; }

  /* Checklist */
  .checklist { list-style:none; }
  .checklist li { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--gray-100); }
  .checklist li:last-child { border-bottom:none; }
  .checklist input[type=checkbox] { width:18px; height:18px; accent-color:var(--success); cursor:pointer; }
  .checklist label { flex:1; cursor:pointer; font-size:.9rem; }
  .checklist label.done { text-decoration:line-through; color:var(--gray-500); }

  /* Quiz */
  .quiz-container { max-width:700px; }
  .quiz-question { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:16px; }
  .quiz-num { font-size:.8rem; color:var(--gray-500); margin-bottom:8px; }
  .quiz-text { font-size:1rem; font-weight:600; margin-bottom:16px; }
  .quiz-options { display:flex; flex-direction:column; gap:8px; }
  .quiz-option { padding:12px 16px; border:2px solid var(--gray-200); border-radius:8px; cursor:pointer; transition:.2s; font-size:.9rem; }
  .quiz-option:hover { border-color:var(--primary); background:#eff6ff; }
  .quiz-option.selected { border-color:var(--primary); background:#eff6ff; }
  .quiz-option.correct { border-color:var(--success); background:#ecfdf5; color:#15803d; }
  .quiz-option.wrong { border-color:var(--danger); background:#fef2f2; color:#dc2626; }
  .quiz-explanation { margin-top:12px; padding:12px; background:#fefce8; border-radius:8px; font-size:.85rem; display:none; }
  .quiz-explanation.show { display:block; }

  /* Quiz Controls */
  .quiz-controls { display:flex; gap:12px; margin-top:20px; }
  .btn { padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer; transition:.2s; font-size:.9rem; }
  .btn-primary { background:var(--primary); color:white; }
  .btn-primary:hover { background:var(--primary-dark); }
  .btn-secondary { background:var(--gray-100); color:var(--gray-700); }
  .btn-secondary:hover { background:var(--gray-200); }
  .btn-success { background:var(--success); color:white; }
  .btn-danger { background:var(--danger); color:white; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  /* Timer */
  .timer { display:flex; gap:8px; align-items:center; font-size:1.5rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .timer i { color:var(--danger); }

  /* Score */
  .score-display { text-align:center; padding:40px; }
  .score-display .score-circle { width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; margin:0 auto 16px; }
  .score-display .score-circle.excellent { background:#dcfce7; color:#15803d; }
  .score-display .score-circle.good { background:#dbeafe; color:#1d4ed8; }
  .score-display .score-circle.average { background:#fef3c7; color:#92400e; }
  .score-display .score-circle.poor { background:#fef2f2; color:#dc2626; }

  /* Wrong Questions Book */
  .wrong-item { padding:16px; border:1px solid var(--gray-200); border-radius:8px; margin-bottom:12px; }
  .wrong-item .wrong-q { font-weight:600; margin-bottom:8px; }
  .wrong-item .wrong-meta { font-size:.8rem; color:var(--gray-500); margin-bottom:8px; }
  .wrong-item .wrong-answer { font-size:.85rem; color:var(--success); }

  /* Monthly Exam Card */
  .exam-card { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
  .exam-header { padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
  .exam-header .exam-period { font-weight:700; font-size:1rem; }
  .exam-body { padding:0 20px 16px; }
  .exam-subject { padding:12px; background:var(--gray-50); border-radius:8px; margin-bottom:8px; }
  .exam-subject:last-child { margin-bottom:0; }
  .exam-subject .exam-name { font-weight:600; font-size:.9rem; }
  .exam-subject .exam-info { font-size:.8rem; color:var(--gray-500); margin-top:4px; }

  /* Teacher Panel Styles */
  .teacher-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .teacher-stat { background:white; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; text-align:center; }
  .teacher-stat i { font-size:2rem; margin-bottom:8px; }
  .teacher-stat .val { font-size:1.8rem; font-weight:700; }
  .teacher-stat .lbl { font-size:.85rem; color:var(--gray-500); }

  /* Student Records Table */
  .records-table { width:100%; border-collapse:collapse; }
  .records-table th, .records-table td { padding:12px 16px; text-align:left; border-bottom:1px solid var(--gray-200); font-size:.85rem; }
  .records-table th { background:var(--gray-50); font-weight:700; position:sticky; top:0; }
  .records-table tr:hover { background:var(--gray-50); }
  .badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:.75rem; font-weight:600; }
  .badge-pass { background:#dcfce7; color:#15803d; }
  .badge-fail { background:#fef2f2; color:#dc2626; }
  .badge-pending { background:#fef3c7; color:#92400e; }

  /* Textarea for student answer upload */
  .answer-textarea { width:100%; min-height:120px; padding:12px; border:2px solid var(--gray-200); border-radius:8px; font-size:.9rem; font-family:inherit; resize:vertical; }
  .answer-textarea:focus { outline:none; border-color:var(--primary); }

  /* Tabs inside cards */
  .inner-tabs { display:flex; gap:4px; margin-bottom:16px; background:var(--gray-100); padding:4px; border-radius:8px; }
  .inner-tab { padding:8px 16px; border:none; background:none; border-radius:6px; font-size:.85rem; font-weight:600; cursor:pointer; transition:.2s; }
  .inner-tab.active { background:white; box-shadow:var(--shadow); }
  .inner-tab:hover { background:var(--gray-200); }
  .inner-tab.active:hover { background:white; }

  /* Responsive */
  @media(max-width:768px) {
    .header { padding:12px 16px; }
    .content { padding:16px; }
    .week-grid { grid-template-columns:1fr; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
    .nav { padding:0 12px; }
    .nav button { padding:12px 14px; font-size:.8rem; }
  }

  /* Month filter */
  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .filter-btn { padding:6px 14px; border:1px solid var(--gray-300); background:white; border-radius:20px; font-size:.8rem; cursor:pointer; transition:.2s; }
  .filter-btn.active { background:var(--primary); color:white; border-color:var(--primary); }

  /* Section for resource links */
  .resource-link { display:inline-flex; align-items:center; gap:4px; color:var(--primary); font-size:.8rem; text-decoration:none; }
  .resource-link:hover { text-decoration:underline; }

  /* Student upload area */
  .upload-area { border:2px dashed var(--gray-300); border-radius:8px; padding:20px; text-align:center; cursor:pointer; transition:.2s; }
  .upload-area:hover { border-color:var(--primary); background:#eff6ff; }
  .upload-area i { font-size:2rem; color:var(--gray-300); margin-bottom:8px; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:1000; display:none; }
  .modal-overlay.show { display:flex; }
  .modal { background:white; border-radius:16px; padding:32px; max-width:500px; width:90vw; max-height:80vh; overflow-y:auto; }
  .modal h3 { margin-bottom:16px; }
  .modal-close { float:right; background:none; border:none; font-size:1.2rem; cursor:pointer; }

  /* Animations */
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Mnemonic Card */
  .mnemonic-card { background:linear-gradient(135deg,#fef3c7,#fef9c3); border:1px solid #fbbf24; border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .mnemonic-card .mnemonic-title { font-weight:700; color:#92400e; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .mnemonic-card .mnemonic-content { font-size:.9rem; line-height:1.6; }

  /* Common Error Card */
  .error-tip { background:#fef2f2; border:1px solid #fca5a5; border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .error-tip .error-title { font-weight:700; color:#dc2626; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .error-tip .error-tip-text { font-size:.85rem; color:#15803d; }

  /* Subject header in weekly view */
  .subject-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--gray-200); }
  .subject-header .subject-name { font-size:1.1rem; font-weight:700; }
</style>
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="login-page">
  <div class="login-box">
    <h1><i class="fas fa-graduation-cap"></i> DSE 備考系統</h1>
    <p class="sub">2026-2027 數學 & 生物備考計劃</p>
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('teacher')" id="tab-teacher">
        <i class="fas fa-chalkboard-teacher"></i>
        教師登入
      </div>
      <div class="role-tab" onclick="setRole('student')" id="tab-student">
        <i class="fas fa-user-graduate"></i>
        學生登入
      </div>
    </div>
    <div id="teacher-fields">
      <input type="password" id="teacher-pw" placeholder="輸入教師密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="student-fields" class="student-fields">
      <div class="student-row">
        <input type="text" id="student-name" placeholder="姓名">
        <input type="text" id="student-class" placeholder="班別 (如5A)">
      </div>
      <input type="password" id="student-pw" placeholder="輸入學生密碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> 登入</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="app" style="display:none">
  <!-- Header -->
  <div class="header">
    <h1>
      <i class="fas fa-calculator math-icon"></i> 數學
      <span style="color:var(--gray-300)">|</span>
      <i class="fas fa-dna bio-icon"></i> 生物
      <span style="color:var(--gray-300); font-weight:400; font-size:.9rem; margin-left:4px;">DSE 2027</span>
    </h1>
    <div class="user-info">
      <span class="user-badge" id="user-badge"><i class="fas fa-user"></i> <span id="user-display"></span></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> 登出</button>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav" id="main-nav"></div>

  <!-- Content -->
  <div class="content" id="main-content"></div>
</div>

<script>
// ====================================
// DSE 備考計劃 2026-2027 完整數據
// 期間: 2026年7月1日 - 2027年3月31日 (共39週)
// ====================================

// ---- 數學章節資料 ----
const MATH_CHAPTERS = [
  { id: "M01", name: "指數與對數", unit: "代數", book: "5A" },
  { id: "M02", name: "多項式", unit: "代數", book: "5A" },
  { id: "M03", name: "方程式與恆等式", unit: "代數", book: "5A" },
  { id: "M04", name: "二項式定理", unit: "代數", book: "5A" },
  { id: "M05", name: "等差數列與等比數列", unit: "數列", book: "5B" },
  { id: "M06", name: "不等式", unit: "代數", book: "5B" },
  { id: "M07", name: "直線與圓", unit: "幾何", book: "5B" },
  { id: "M08", name: "三角學", unit: "三角學", book: "6A" },
  { id: "M09", name: "續三角學", unit: "三角學", book: "6A" },
  { id: "M10", name: "測量學", unit: "幾何", book: "6A" },
  { id: "M11", name: "概率", unit: "概率與統計", book: "6A" },
  { id: "M12", name: "統計學", unit: "概率與統計", book: "6A" }
];

// ---- 生物章節資料 ----
const BIO_CHAPTERS = [
  { id: "B01", name: "細胞與生命分子", unit: "細胞與生命分子", book: "Ch.2-5" },
  { id: "B02", name: "細胞的能量與代謝", unit: "細胞與生命分子", book: "Ch.4-6" },
  { id: "B03", name: "植物營養與光合作用", unit: "生物與環境", book: "Ch.7-9" },
  { id: "B04", name: "人體營養", unit: "健康與疾病", book: "Ch.10-11" },
  { id: "B05", name: "氣體交換與呼吸", unit: "生物與環境", book: "Ch.12-13" },
  { id: "B06", name: "運輸系統", unit: "生物與環境", book: "Ch.14-15" },
  { id: "B07", name: "支持與運動", unit: "生物與環境", book: "Ch.16-17" },
  { id: "B08", name: "偵測與協調（神經）", unit: "生物與環境", book: "Ch.18-19" },
  { id: "B09", name: "協調與反應（荷爾蒙）", unit: "生物與環境", book: "Ch.19-20" },
  { id: "B10", name: "恆定性", unit: "生物與環境", book: "Ch.21-22" },
  { id: "B11", name: "生殖", unit: "遺傳與進化", book: "Ch.23-24" },
  { id: "B12", name: "遺傳與變異", unit: "遺傳與進化", book: "Ch.26-28" }
];

// ---- 數學口訣 ----
const MATH_MNEMONICS = [
  { id: "MM01", chapter: "M01", title: "指數法則口訣", content: "同底相乘指數加，同底相除指數減；指數為負取倒數，指數為零等於一" },
  { id: "MM02", chapter: "M01", title: "對數轉換", content: "log(base a) b = ln b / ln a，換底公式要記牢" },

      "step 2-exam-type question": "歷屆題型練習(LQ/MC/SQ)、跨課練習",
      "step 3-mock exam & 真題": "模擬試卷(系列1&2)、DSE真题(2012-2025)、評分樣本"

</script>
<script>
// ===== APP STATE =====
let currentUser = null; // { role:'teacher'|'student', name, class, ... }
let currentNav = 'overview';
let currentMonthFilter = 'all';
let quizState = { questions:[], current:0, answers:[], timer:null, timeLeft:0 };
let wrongQuestions = JSON.parse(localStorage.getItem('dse_wrong')||'[]');
let studentProgress = JSON.parse(localStorage.getItem('dse_progress')||'{}');

function saveProgress(){
  localStorage.setItem('dse_progress', JSON.stringify(studentProgress));
  localStorage.setItem('dse_wrong', JSON.stringify(wrongQuestions));
}

// ===== LOGIN =====
let loginRole = 'teacher';
function setRole(role){
  loginRole = role;
  document.getElementById('tab-teacher').classList.toggle('active', role==='teacher');
  document.getElementById('tab-student').classList.toggle('active', role==='student');
  document.getElementById('teacher-fields').style.display = role==='teacher'?'block':'none';
  document.getElementById('student-fields').classList.toggle('show', role==='student');
  document.getElementById('login-error').style.display = 'none';
}

function doLogin(){
  const errEl = document.getElementById('login-error');
  if(loginRole==='teacher'){
    const pw = document.getElementById('teacher-pw').value;
    if(pw==='GTASLyann'){
      currentUser = {role:'teacher', name:'Lyann 老師'};
      errEl.style.display='none';
      enterApp();
    } else {
      errEl.textContent='密碼錯誤！';
      errEl.style.display='block';
    }
  } else {
    const name = document.getElementById('student-name').value.trim();
    const cls = document.getElementById('student-class').value.trim();
    const pw = document.getElementById('student-pw').value;
    if(!name||!cls){ errEl.textContent='請填寫姓名和班別！'; errEl.style.display='block'; return; }
    if(pw==='GTAS2027'){
      currentUser = {role:'student', name:name, class:cls};
      errEl.style.display='none';
      enterApp();
    } else {
      errEl.textContent='密碼錯誤！';
      errEl.style.display='block';
    }
  }
}

function doLogout(){
  currentUser = null;
  currentNav = 'overview';
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('teacher-pw').value='';
  document.getElementById('student-pw').value='';
  document.getElementById('student-name').value='';
  document.getElementById('student-class').value='';
}

function enterApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-display').textContent = currentUser.role==='teacher'?
    currentUser.name : `${currentUser.name} (${currentUser.class})`;
  buildNav();
  showPage('overview');
}

// ===== NAVIGATION =====
function buildNav(){
  const nav = document.getElementById('main-nav');
  let items = [
    {id:'overview', icon:'fa-chart-line', label:'計劃概覽'},
    {id:'weekly', icon:'fa-calendar-week', label:'每週計劃'},
    {id:'monthly', icon:'fa-calendar-alt', label:'月度考試'},
    {id:'checklist', icon:'fa-tasks', label:'進度清單'}
  ];
  if(currentUser.role==='student'){
    items.push({id:'mc-quiz', icon:'fa-question-circle', label:'選擇題練習'});
    items.push({id:'sq-practice', icon:'fa-pen-fancy', label:'結構題練習'});
    items.push({id:'wrong-book', icon:'fa-book-open', label:'錯題記錄'});
  }
  if(currentUser.role==='teacher'){
    items.push({id:'question-bank', icon:'fa-database', label:'題庫管理'});
    items.push({id:'students', icon:'fa-users', label:'學生記錄'});
    items.push({id:'resources', icon:'fa-folder-open', label:'本地資源'});
  }
  nav.innerHTML = items.map(it =>
    `<button onclick="showPage('${it.id}')" id="nav-${it.id}"><i class="fas ${it.icon}"></i>${it.label}</button>`
  ).join('');
}

function showPage(id){
  currentNav = id;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  const navBtn = document.getElementById('nav-'+id);
  if(navBtn) navBtn.classList.add('active');
  const ct = document.getElementById('main-content');
  switch(id){
    case 'overview': renderOverview(ct); break;
    case 'weekly': renderWeekly(ct); break;
    case 'monthly': renderMonthly(ct); break;
    case 'checklist': renderChecklist(ct); break;
    case 'mc-quiz': renderMCQuiz(ct); break;
    case 'sq-practice': renderSQPractice(ct); break;
    case 'wrong-book': renderWrongBook(ct); break;
    case 'question-bank': renderQuestionBank(ct); break;
    case 'students': renderStudents(ct); break;
    case 'resources': renderResources(ct); break;
    default: ct.innerHTML='<div class="card"><p>頁面開發中...</p></div>';
  }
}

// ===== HELPER =====
function getPhaseLabel(p){ return ['','階段一：單元複習','階段二：跨單元整合','階段三：模擬考衝刺'][p]; }
function getPhaseClass(p){ return 'phase'+p; }
function getMonthName(m){
  const map = {'2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月','2027-01':'1月','2027-02':'2月','2027-03':'3月'};
  return map[m]||m;
}
function fmtDate(d){
  const parts = d.split('-');
  return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
}
function getProgressKey(weekNum, subject){ return `w${weekNum}_${subject}`; }

function getWeekProgress(weekNum){
  const key = `week_${weekNum}_completed`;
  return studentProgress[key] || false;
}
function setWeekProgress(weekNum, done){
  studentProgress[`week_${weekNum}_completed`] = done;
  saveProgress();
}

function getMCProgress(week, subject){
  return studentProgress[`mc_${week}_${subject}`] || null; // { score, total, answers, date }
}
function setMCProgress(week, subject, data){
  studentProgress[`mc_${week}_${subject}`] = data;
  saveProgress();
}

function getSQProgress(week, subject){
  return studentProgress[`sq_${week}_${subject}`] || null;
}
function setSQProgress(week, subject, data){
  studentProgress[`sq_${week}_${subject}`] = data;
  saveProgress();
}

function renderPhaseBanner(){
  // Find current phase based on date
  const now = new Date();
  let phase = 3;
  if(now < new Date('2026-11-01')) phase = 1;
  else if(now < new Date('2027-02-01')) phase = 2;
  const titles = ['','單元章節複習（7-10月）','跨單元整合（11月-1月）','模擬考衝刺（2-3月）'];
  const descs = ['','按章節逐一複習數學12章+生物12章的核心內容','跨單元綜合題型訓練，培養整合應用能力','全真模擬考+歷屆真题，完善應試技巧與時間管理'];
  return `<div class="phase-banner ${getPhaseClass(phase)}">
    <h2><i class="fas fa-flag"></i> 當前階段：${titles[phase]}</h2>
    <p>${descs[phase]}</p>
  </div>`;
}

function renderPhaseCard(p, period, weeks, desc, color){
  const phaseWeeks = WEEKLY_PLAN.filter(w=>w.phase===p);
  const done = phaseWeeks.filter(w=>getWeekProgress(w.week)).length;
  return `<div class="card" style="border-top:4px solid ${color}">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:.8rem;color:var(--gray-500)">階段${['','一','二','三'][p]}</div>
        <div style="font-weight:700;font-size:1rem;margin:4px 0">${desc}</div>
        <div style="font-size:.8rem;color:var(--gray-500)">${period} · ${weeks}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:1.5rem;font-weight:700;color:${color}">${done}/${phaseWeeks.length}</div>
        <div style="font-size:.75rem;color:var(--gray-500)">週已完成</div>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" style="width:${phaseWeeks.length?done/phaseWeeks.length*100:0}%;background:${color}"></div></div>
  </div>`;
}

function renderCurrentWeekDetail(){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  let current = WEEKLY_PLAN.find(w => today >= w.startDate && today <= w.endDate);
  if(!current) current = WEEKLY_PLAN[0];
  const mCh = current.math.chapter;
  const bCh = current.bio.chapter;
  const mathMn = MATH_MNEMONICS.filter(m=>m.chapter===mCh);
  const bioMn = BIO_MNEMONICS.filter(m=>m.chapter===bCh);
  const mathErr = MATH_COMMON_ERRORS.filter(e=>e.chapter===mCh);
  const bioErr = BIO_COMMON_ERRORS.filter(e=>e.chapter===bCh);

  return `
    <div style="margin-bottom:8px;font-size:.85rem;color:var(--gray-500)">
      第${current.week}週 (${fmtDate(current.startDate)} - ${fmtDate(current.endDate)}) · ${getPhaseLabel(current.phase)}
    </div>
    <div style="display:grid;gap:16px">
      <div>
        <div class="subject-header">
          <span class="subject-tag math">數學</span>
          <span class="subject-name">${current.math.topic}</span>
        </div>
        ${current.math.mcFocus?`<div style="font-size:.85rem;margin-bottom:4px"><i class="fas fa-bullseye" style="color:var(--gray-400)"></i> MC重點：${current.math.mcFocus}</div>`:''}
        ${current.math.sqFocus?`<div style="font-size:.85rem;margin-bottom:4px"><i class="fas fa-pen" style="color:var(--gray-400)"></i> SQ重點：${current.math.sqFocus}</div>`:''}
        ${current.math.resource?`<div style="font-size:.8rem;color:var(--gray-500)"><i class="fas fa-folder"></i> 資源：${current.math.resource}</div>`:''}
        ${mathErr.map(e=>`<div class="error-tip"><div class="error-title"><i class="fas fa-exclamation-triangle"></i> ${e.error}</div><div class="error-tip-text"><i class="fas fa-check-circle"></i> ${e.tip}</div></div>`).join('')}
        ${mathMn.map(m=>`<div class="mnemonic-card"><div class="mnemonic-title"><i class="fas fa-lightbulb"></i> ${m.title}</div><div class="mnemonic-content">${m.content}</div></div>`).join('')}
      </div>
      <div>
        <div class="subject-header">
          <span class="subject-tag bio">生物</span>
          <span class="subject-name">${current.bio.topic}</span>
        </div>
        ${current.bio.mcFocus?`<div style="font-size:.85rem;margin-bottom:4px"><i class="fas fa-bullseye" style="color:var(--gray-400)"></i> MC重點：${current.bio.mcFocus}</div>`:''}
        ${current.bio.sqFocus?`<div style="font-size:.85rem;margin-bottom:4px"><i class="fas fa-pen" style="color:var(--gray-400)"></i> SQ重點：${current.bio.sqFocus}</div>`:''}
        ${current.bio.resource?`<div style="font-size:.8rem;color:var(--gray-500)"><i class="fas fa-folder"></i> 資源：${current.bio.resource}</div>`:''}
        ${bioErr.map(e=>`<div class="error-tip"><div class="error-title"><i class="fas fa-exclamation-triangle"></i> ${e.error}</div><div class="error-tip-text"><i class="fas fa-check-circle"></i> ${e.tip}</div></div>`).join('')}
        ${bioMn.map(m=>`<div class="mnemonic-card"><div class="mnemonic-title"><i class="fas fa-lightbulb"></i> ${m.title}</div><div class="mnemonic-content">${m.content}</div></div>`).join('')}
      </div>
    </div>
  `;
}

}

function loadMCQuestions(){

        <div class="quiz-controls" style="justify-content:center">
          <button class="btn btn-primary" onclick="startMCQuiz()"><i class="fas fa-redo"></i> 重新作答</button>
          <button class="btn btn-secondary" onclick="showMCReview(${week},'${subject}')"><i class="fas fa-eye"></i> 查看詳情</button>
        </div>
      </div>`;
    return;
  }

  area.innerHTML = `<div class="card" style="text-align:center;padding:30px">
    <p style="font-size:.9rem;margin-bottom:8px">第${week}週 ${subject==='math'?'數學':'生物'}選擇題</p>
    <p style="font-size:.85rem;color:var(--gray-500);margin-bottom:16px">共 ${weekQuestions.length} 題 · 建議時限15分鐘</p>
    <button class="btn btn-primary" onclick="startMCQuiz()"><i class="fas fa-play"></i> 開始作答</button>
  </div>`;
}

function startMCQuiz(){
  const week = parseInt(document.getElementById('mc-week-select').value);
  const subject = document.getElementById('mc-subject-select').value;
  const bank = subject==='math' ? MATH_MC_BANK : BIO_MC_BANK;
  const questions = bank.filter(q=>q.week===week);

  quizState = { questions, current:0, answers:new Array(questions.length).fill(-1), timer:null, timeLeft:15*60, week, subject };

  renderMCQuizPlaying();
  quizState.timer = setInterval(()=>{
    quizState.timeLeft--;
    updateTimer();
    if(quizState.timeLeft<=0) finishMCQuiz();
  },1000);
}

function renderMCQuizPlaying(){
  const area = document.getElementById('mc-quiz-area');
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const optLabels = ['A','B','C','D'];

  area.innerHTML = `
    <div class="quiz-container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-weight:600">第${quizState.current+1}/${total}題</span>
        <div class="timer"><i class="fas fa-clock"></i> <span id="mc-timer">${formatTime(quizState.timeLeft)}</span></div>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${(quizState.current/total)*100}%"></div></div>
      <div class="quiz-question">
        <div class="quiz-num">${q.chapter} · ${q.id}</div>
        <div class="quiz-text">${q.q}</div>
        <div class="quiz-options">
          ${q.options.map((opt,i)=>`
            <div class="quiz-option ${quizState.answers[quizState.current]===i?'selected':''}"
              onclick="selectMCAnswer(${i})">
              <strong>${optLabels[i]}</strong>. ${opt}
            </div>
          `).join('')}
        </div>
      </div>
      <div class="quiz-controls">
        <button class="btn btn-secondary" ${quizState.current===0?'disabled':''} onclick="prevMCQ()"><i class="fas fa-arrow-left"></i> 上一題</button>
        ${quizState.current<total-1?
          `<button class="btn btn-primary" onclick="nextMCQ()">下一題 <i class="fas fa-arrow-right"></i></button>`:
          `<button class="btn btn-success" onclick="finishMCQuiz()"><i class="fas fa-check"></i> 完成並提交</button>`
        }
      </div>
    </div>`;
}

function selectMCAnswer(i){
  quizState.answers[quizState.current] = i;
  renderMCQuizPlaying();
}

function prevMCQ(){ if(quizState.current>0){ quizState.current--; renderMCQuizPlaying(); } }
function nextMCQ(){ if(quizState.current<quizState.questions.length-1){ quizState.current++; renderMCQuizPlaying(); } }

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s%60;
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function updateTimer(){
  const el = document.getElementById('mc-timer');
  if(el) el.textContent = formatTime(quizState.timeLeft);
}

function finishMCQuiz(){
  clearInterval(quizState.timer);
  const questions = quizState.questions;
  const answers = quizState.answers;
  let score = 0;
  questions.forEach((q,i)=>{ if(answers[i]===q.answer) score++; });
  const total = questions.length;

  // Save progress
  setMCProgress(quizState.week, quizState.subject, {score, total, answers, date:new Date().toLocaleDateString('zh-HK')});

  // Update wrong questions
  questions.forEach((q,i)=>{
    if(answers[i]!==q.answer){
      const existing = wrongQuestions.findIndex(w=>w.id===q.id);
      if(existing>=0) wrongQuestions[existing].count = (wrongQuestions[existing].count||1)+1;
      else wrongQuestions.push({...q, count:1, subject:quizState.subject, week:quizState.week});
    } else {
      // Remove from wrong if correct
      const idx = wrongQuestions.findIndex(w=>w.id===q.id);
      if(idx>=0) wrongQuestions.splice(idx,1);
    }
  });
  saveProgress();

  // Show result
  const pct = (score/total*100).toFixed(0);
  const cls = pct>=80?'excellent':pct>=60?'good':pct>=40?'average':'poor';
  const area = document.getElementById('mc-quiz-area');
  const optLabels = ['A','B','C','D'];

  area.innerHTML = `
    <div class="card score-display">
      <div class="score-circle ${cls}">${score}/${total}</div>
      <p style="font-weight:600;font-size:1.1rem">得分率：${pct}%</p>
      <p style="color:var(--gray-500);font-size:.85rem;margin:4px 0 16px">用時：${formatTime(15*60-quizState.timeLeft)}</p>
    </div>
    <div class="quiz-container">
      ${questions.map((q,i)=>{
        const isCorrect = answers[i]===q.answer;
        const isWrong = answers[i]!==-1 && answers[i]!==q.answer;
        const isSkipped = answers[i]===-1;
        return `<div class="quiz-question" style="border-left:4px solid ${isCorrect?'var(--success)':isWrong?'var(--danger)':'var(--gray-300)'}">
          <div class="quiz-num">第${i+1}題 ${isCorrect?'✅ 正確':isWrong?'❌ 錯誤':'⏭️ 未答'}</div>
          <div class="quiz-text">${q.q}</div>
          <div class="quiz-options">
            ${q.options.map((opt,j)=>{
              let cls = '';
              if(j===q.answer) cls='correct';
              else if(j===answers[i]&&j!==q.answer) cls='wrong';
              return `<div class="quiz-option ${cls}">${optLabels[j]}. ${opt} ${j===q.answer?'<i class="fas fa-check" style="margin-left:6px"></i>':''} ${j===answers[i]&&j!==q.answer?'<i class="fas fa-times" style="margin-left:6px"></i>':''}</div>`;
            }).join('')}
          </div>
          <div class="quiz-explanation show"><i class="fas fa-lightbulb" style="color:var(--accent)"></i> <strong>解析：</strong>${q.explanation}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="quiz-controls" style="justify-content:center">
      <button class="btn btn-primary" onclick="loadMCQuestions()"><i class="fas fa-arrow-left"></i> 返回</button>
      <button class="btn btn-secondary" onclick="startMCQuiz()"><i class="fas fa-redo"></i> 重做</button>
    </div>`;
}

function renderStudents(ct){
  ct.innerHTML = `<div class="fade-in">
    <h2 style="margin-bottom:16px"><i class="fas fa-users"></i> 學生記錄</h2>
    <p style="color:var(--gray-500);font-size:.9rem;margin-bottom:20px">
      學生進度資料儲存在本地 localStorage（瀏覽器端）
    </p>
    <div class="card">
      <h2><i class="fas fa-chart-bar"></i> 整體統計</h2>
      <div class="teacher-stats" id="student-stats-area"></div>
    </div>
    <div class="card">
      <h2><i class="fas fa-history"></i> 作答記錄</h2>
      <div id="student-records-area" style="max-height:400px;overflow-y:auto"></div>
    </div>
  </div>`;

  // Show overall stats
  let totalMC = 0, totalCorrect = 0, totalSQ = 0;
  WEEKLY_PLAN.forEach(w=>{
    const mMC = getMCProgress(w.week,'math');
    const bMC = getMCProgress(w.week,'bio');
    const mSQ = getSQProgress(w.week,'math');
    const bSQ = getSQProgress(w.week,'bio');
    if(mMC){ totalMC+=mMC.total; totalCorrect+=mMC.score; }
    if(bMC){ totalMC+=bMC.total; totalCorrect+=bMC.score; }
    if(mSQ) totalSQ++;
    if(bSQ) totalSQ++;
  });

  document.getElementById('student-stats-area').innerHTML = `
    <div class="teacher-stat"><i class="fas fa-check-circle" style="color:var(--success)"></i><div class="val">${totalCorrect}/${totalMC}</div><div class="lbl">MC總答對率</div></div>
    <div class="teacher-stat"><i class="fas fa-percentage" style="color:var(--primary)"></i><div class="val">${totalMC?((totalCorrect/totalMC)*100).toFixed(1):0}%</div><div class="lbl">MC平均得分率</div></div>
    <div class="teacher-stat"><i class="fas fa-pen-fancy" style="color:var(--secondary)"></i><div class="val">${totalSQ}</div><div class="lbl">已提交結構題次數</div></div>
    <div class="teacher-stat"><i class="fas fa-exclamation-circle" style="color:var(--danger)"></i><div class="val">${wrongQuestions.length}</div><div class="lbl">錯題數量</div></div>
  `;

  // Show records
  const records = [];
  WEEKLY_PLAN.forEach(w=>{
    ['math','bio'].forEach(subj=>{
      const mc = getMCProgress(w.week, subj);
      const sq = getSQProgress(w.week, subj);
      if(mc) records.push({type:'MC', week:w.week, subject:subj, detail:`${mc.score}/${mc.total} (${(mc.score/mc.total*100).toFixed(0)}%)`, date:mc.date});
      if(sq) records.push({type:'SQ', week:w.week, subject:subj, detail:'已提交', date:sq.date});
    });
  });

  document.getElementById('student-records-area').innerHTML = records.length===0?
    '<p style="color:var(--gray-500);text-align:center;padding:20px">暫無記錄</p>':
    `<table class="records-table">
      <thead><tr><th>類型</th><th>週次</th><th>科目</th><th>結果</th><th>日期</th></tr></thead>
      <tbody>${records.sort((a,b)=>b.week-a.week).map(r=>`
        <tr>
          <td><span class="badge ${r.type==='MC'?'badge-pass':'badge-pending'}">${r.type==='MC'?'選擇題':'結構題'}</span></td>
          <td>第${r.week}週</td>
          <td><span class="subject-tag ${r.subject==='math'?'math':'bio'}">${r.subject==='math'?'數學':'生物'}</span></td>
          <td>${r.detail}</td>
          <td>${r.date||'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ===== TEACHER: LOCAL RESOURCES =====
function renderResources(ct){
  ct.innerHTML = `<div class="fade-in">
    <h2 style="margin-bottom:16px"><i class="fas fa-folder-open"></i> 本地資源目錄</h2>
    <p style="color:var(--gray-500);font-size:.9rem;margin-bottom:20px">
      資源儲存位置：<code style="background:var(--gray-100);padding:2px 8px;border-radius:4px">本地資源目錄</code>
    </p>

    <div class="card">
      <h2><i class="fas fa-calculator" style="color:var(--primary)"></i> 數學資源</h2>
      <table class="records-table">
        <thead><tr><th>目錄</th><th>說明</th><th>文件數</th></tr></thead>
        <tbody>
          ${Object.entries(LOCAL_RESOURCES.math.structure).map(([name,desc])=>`
            <tr><td style="font-weight:600">${name}</td><td>${desc}</td><td>-</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2><i class="fas fa-dna" style="color:var(--success)"></i> 生物資源</h2>
      <table class="records-table">
        <thead><tr><th>目錄</th><th>說明</th></tr></thead>
        <tbody>
          ${Object.entries(LOCAL_RESOURCES.bio.structure).map(([name,desc])=>`
            <tr><td style="font-weight:600">${name}</td><td>${desc}</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2><i class="fas fa-link"></i> 週計劃對應資源</h2>
      <p style="font-size:.85rem;color:var(--gray-500);margin-bottom:12px">每週建議使用的本地資源檔案</p>
      <div style="max-height:500px;overflow-y:auto">
        ${WEEKLY_PLAN.map(w=>`
          <div style="padding:10px 0;border-bottom:1px solid var(--gray-100)">
            <div style="font-weight:600;font-size:.9rem">第${w.week}週 (${fmtDate(w.startDate)} - ${fmtDate(w.endDate)})</div>
            <div style="font-size:.8rem;color:var(--gray-500);margin-top:4px">
              <span class="subject-tag math" style="font-size:.7rem">數</span> ${w.math.resource}
            </div>
            <div style="font-size:.8rem;color:var(--gray-500);margin-top:2px">
              <span class="subject-tag bio" style="font-size:.7rem">生</span> ${w.bio.resource}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}
